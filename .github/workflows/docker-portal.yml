name: Build & Push Portal Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'Portal/src/**'
      - 'Portal/views/**'
      - 'Portal/public/**'
      - 'Portal/Dockerfile'
      - 'Portal/.dockerignore'
      - 'Portal/package.json'
      - 'Portal/package-lock.json'
      - 'Portal/tsconfig.json'
      - '.github/workflows/docker-portal.yml'

  pull_request:
    branches: [main]
    paths:
      - 'Portal/src/**'
      - 'Portal/views/**'
      - 'Portal/public/**'
      - 'Portal/Dockerfile'
      - 'Portal/.dockerignore'
      - 'Portal/package.json'
      - 'Portal/package-lock.json'
      - 'Portal/tsconfig.json'
      - '.github/workflows/docker-portal.yml'

  workflow_dispatch:
    inputs:
      push_image:
        description: Push image to GHCR
        type: boolean
        default: true

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cloudlaps-portal

jobs:
  validation:
    name: Validate Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./Portal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Compile TypeScript
        run: npm run build

  docker:
    name: Build Docker Image
    needs: [validation]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || github.event.inputs.push_image != 'false')
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Portal/Dockerfile

      - name: Build and optionally push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ github.workspace }}/Portal
          file: Portal/Dockerfile
          push: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || github.event.inputs.push_image != 'false') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true